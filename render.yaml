# 13.2 — Render blueprint for the bgio server.
#
# Render reads this file on push to `main` and rebuilds + redeploys the
# `settlement-server` web service. Persistent state lives on `/data` via a
# small disk; the SQLite database (13.3) is written there. Pushing this
# repo to Render once (Blueprint -> "New from blueprint") wires everything
# up in the dashboard; subsequent deploys are git-driven with no UI work.
#
# Free tier notes (per 13.2 plan):
# - The web service sleeps after ~15 min of idle and takes ~30s to wake.
# - Sleep does NOT delete the disk. SQLite content persists across wakes.
# - The 10.6 server-down spinner with backoff covers the wake window.
#
# Env vars:
# - PORT — Render injects this; the server reads it via process.env.PORT.
# - STORAGE_KIND — set to `sqlite` so the 10.4 factory selects the
#   better-sqlite3 adapter.
# - SQLITE_PATH — the on-disk database file. Must live under /data so it
#   survives restarts.
# - VITE_SERVER_URL — not used by the server itself, but documented here so
#   the static SPA build can reference the same hostname when published.

services:
  - type: web
    name: settlement-server
    runtime: docker
    plan: free
    region: oregon
    rootDir: .
    dockerfilePath: ./server/Dockerfile
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_KIND
        value: sqlite
      - key: SQLITE_PATH
        value: /data/settlement.sqlite
    disk:
      name: settlement-data
      mountPath: /data
      sizeGB: 1
