# Render blueprint for the networked Settlement server.
#
# Provisions a single Docker web service. The service rebuilds from
# `server/Dockerfile` whenever `main` advances.
#
# Free-tier caveat (current state): Render's free plan does not
# support persistent disks, so `STORAGE_KIND=memory` is set and the
# `disk:` mount is omitted. Every cold start (deploy, idle-recycle
# after ~15 min) wipes accounts, matches, and run history. Acceptable
# only for smoke-testing the networked path.
#
# To upgrade to durable storage:
#   1. Flip `plan: free` → `plan: starter` ($7/mo).
#   2. Flip `STORAGE_KIND: memory` → `STORAGE_KIND: sqlite`.
#   3. Add `SQLITE_PATH: /data/settlement.sqlite` env var.
#   4. Restore the `disk:` block (name: data, mountPath: /data, sizeGB: 1).
# That drops in SQLite-on-persistent-disk; accounts + matches survive
# restarts. CLAUDE.md's deployment section already describes that end
# state; the in-memory mode here is a temporary stopgap.

services:
  - type: web
    name: settlement-server
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    healthCheckPath: /games
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8000"
      # Free-tier: in-memory storage. Wipes on every cold start. See
      # the file header for the upgrade path to SQLite + persistent disk.
      - key: STORAGE_KIND
        value: memory
      # Issue 023 — Render terminates TLS at its edge; trust X-Forwarded-For
      # so the auth rate-limit buckets by real client IP, not the proxy.
      - key: TRUST_PROXY
        value: "true"
      # CSV of allowed origins for the SocketIO transport + auth routes.
      # The value here must be the bare *origin* of /deploy.config.json#pagesUrl
      # (no path, no trailing slash). Add additional origins (custom domain,
      # preview branches) as comma-separated entries.
      - key: ALLOWED_ORIGINS
        value: https://jonborchardt.github.io
