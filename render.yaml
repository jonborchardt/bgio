# Render blueprint for the networked Settlement server.
#
# Provisions a single Docker web service backed by a 1 GB persistent disk
# at /data, where SQLite stores both match state (bgio) and the accounts
# table (`server/auth/sqliteAccountsStore.ts`). The service rebuilds from
# `server/Dockerfile` whenever `main` advances.
#
# Detach + reattach: deleting the service in Render and pointing at this
# blueprint again rebuilds with the same env vars and disk mount; the
# disk's contents survive only if `disk.name` matches.

services:
  - type: web
    name: settlement-server
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    healthCheckPath: /games
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8000"
      - key: STORAGE_KIND
        value: sqlite
      - key: SQLITE_PATH
        value: /data/settlement.sqlite
      # CSV of allowed origins for the SocketIO transport + auth routes.
      # Set this to the deployed Pages URL (and any preview URLs) once
      # the client lands. Leave unset for a permissive dev default.
      - key: ALLOWED_ORIGINS
        sync: false
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
