name: deploy-pages

on:
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build (networked, Render)
        # The networked client is the default Pages experience: visiting
        # the published URL lands on the lobby and matchmakes against
        # the Render server. The Render URL is sourced from
        # /deploy.config.json#renderServerUrl by scripts/build-networked.mjs.
        #
        # Both transports are bundled, so /#hotseat at the same Pages
        # URL mounts the hot-seat shell as a runtime escape hatch
        # (no separate build, no separate branch).
        run: npm run build:networked

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
